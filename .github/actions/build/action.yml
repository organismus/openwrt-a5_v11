name: Build firmware in docker

inputs:
  tag:
    description: 'tag name, for example: v.1.0.0'
    required: false
  s:
    required: true

runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v4

    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
#        password: ${{ imputs.s }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

    - uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: network=host
    - name: Cleanup temporary artifacts directory
      run: rm -rf ${{ env.ARTIFACTS_TEMP_DIR }}
      shell: bash
    - run: echo "TAGS ${{ steps.meta.outputs.tags }}"
      shell: bash
    - name: Build in docker conitainer
      id: docker-build
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.test
        tags: ${{ steps.meta.outputs.tags }}
        push: false
        labels: ${{ steps.meta.outputs.labels }}
        provenance: false
        sbom: false
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=local,dest=${{ env.ARTIFACTS_TEMP_DIR }}
        build-args: |
          V=${{env.V}}
      env:
        DOCKER_BUILD_SUMMARY: false

    - name: Generate artifact attestation
      uses: actions/attest-build-provenance@v1
      if: github.event.repository.private == false
      with:
        subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
        subject-digest: ${{ steps.push.outputs.digest }}
        push-to-registry: true

    - name: Upload Built Artifact
      uses: actions/upload-artifact@master
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: ${{ env.ARTIFACTS_TEMP_DIR }}/

